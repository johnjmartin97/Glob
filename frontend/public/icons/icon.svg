<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0f172a"/>

  <g transform="translate(92.16 92.16) scale(0.64)">
    <!-- Body: roughly circular but with a fluid, slightly irregular splat outline -->
    <path d="M 256 94
      C 300.5 94 348.5 102.7 381.9 136.1
      C 415.3 169.5 421 218.3 421 262
      C 421 305.7 417 355.6 383.3 389.3
      C 349.6 423 301.6 434 256 434
      C 210.4 434 164.5 419.5 131.5 386.5
      C 98.5 353.5 93 305.2 93 262
      C 93 218.8 93.2 167.4 127.3 133.3
      C 161.4 99.2 211.5 94 256 94
      Z"
      fill="#9333ea"/>

    <!-- Right arm: shoulder anchored in the lower third of the body -> bicep straight out at 90 degrees, lengthened to 200 -> forearm bends 60 degrees from the bicep (also length 200), raising the fist further from the head -->
    <path d="M 370 332 L 570 332 L 470 159" fill="none" stroke="#9333ea" stroke-width="80" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="470" cy="159" r="48" fill="#9333ea"/>
    <circle cx="570" cy="332" r="60" fill="#9333ea"/>
    <circle cx="495" cy="305" r="52" fill="#9333ea"/>
    <ellipse cx="588" cy="352" rx="34" ry="23" fill="#581c87" opacity="0.65" transform="rotate(35 588 352)"/>
    <ellipse cx="554" cy="309" rx="30" ry="20" fill="#d8b4fe" opacity="0.85" transform="rotate(30 554 309)"/>

    <!-- Left arm (mirrored) -->
    <path d="M 142 332 L -58 332 L 42 159" fill="none" stroke="#9333ea" stroke-width="80" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="42" cy="159" r="48" fill="#9333ea"/>
    <circle cx="-58" cy="332" r="60" fill="#9333ea"/>
    <circle cx="17" cy="305" r="52" fill="#9333ea"/>
    <ellipse cx="-76" cy="352" rx="34" ry="23" fill="#581c87" opacity="0.65" transform="rotate(-35 -76 352)"/>
    <ellipse cx="-42" cy="309" rx="30" ry="20" fill="#d8b4fe" opacity="0.85" transform="rotate(-30 -42 309)"/>

    <!-- Soft gloss highlight near the crown for a fluid sheen -->
    <path d="M 195 130
      C 230 113 288 124 312 158
      C 322 174 308 188 290 176
      C 270 162 240 146 210 144
      C 190 142 178 142 195 130 Z"
      fill="#a855f7" opacity="0.5"/>

    <!-- Eyes: big, round, centered, looking straight ahead -->
    <ellipse cx="205" cy="235" rx="32" ry="36" fill="white"/>
    <ellipse cx="307" cy="235" rx="32" ry="36" fill="white"/>
    <circle cx="205" cy="241" r="16" fill="#1e1b4b"/>
    <circle cx="307" cy="241" r="16" fill="#1e1b4b"/>
    <circle cx="198" cy="231" r="6.5" fill="white" opacity="0.85"/>
    <circle cx="300" cy="231" r="6.5" fill="white" opacity="0.85"/>

    <!-- Big happy open smile -->
    <path d="M 193 322
      C 193 370 319 370 319 322
      C 305 354 207 354 193 322 Z"
      fill="#1e1b4b"/>
  </g>
</svg>
