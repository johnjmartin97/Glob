services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: glob
      POSTGRES_PASSWORD: glob
      POSTGRES_DB: glob
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glob"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://glob:glob@postgres:5432/glob
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      USDA_API_KEY: ${USDA_API_KEY:-DEMO_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:
